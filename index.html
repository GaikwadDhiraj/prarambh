<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रारंभ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
        }

        .shape1 {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            animation-delay: 0s;
        }

        .shape2 {
            width: 400px;
            height: 400px;
            bottom: -200px;
            right: -200px;
            background: linear-gradient(45deg, #6b5b95, #88b04b);
            animation-delay: -5s;
        }

        .shape3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05);
            animation: pulse 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, 30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.1; }
        }

        /* Main text container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        /* Prarambh text styling - Orange color */
        h1 {
            font-size: 180px;
            color: #FF5722;  /* Orange color */
            text-shadow: 
                0 0 10px rgba(255, 87, 34, 0.3),
                0 0 20px rgba(255, 87, 34, 0.2),
                5px 5px 0 rgba(0, 0, 0, 0.1),
                10px 10px 0 rgba(0, 0, 0, 0.05);
            letter-spacing: 5px;
            position: relative;
            display: inline-block;
            line-height: 1.2;
        }

        /* Removed the ::after element that was creating the mirrored text */
        /* Removed glowText animation */

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 120px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 80px;
            }
            
            .shape1 {
                width: 200px;
                height: 200px;
            }
            
            .shape2 {
                width: 250px;
                height: 250px;
            }
        }

        /* Subtle particle effect */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: particleFloat 10s linear infinite;
        }

        @keyframes particleFloat {
            from {
                transform: translateY(100vh) translateX(-50%);
            }
            to {
                transform: translateY(-100vh) translateX(50%);
            }
        }

        /* Generate multiple particles */
        .particle:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-duration: 12s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-duration: 10s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-duration: 15s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-duration: 9s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-duration: 11s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-duration: 13s; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; animation-duration: 8s; animation-delay: 4.5s; }
        .particle:nth-child(9) { left: 90%; animation-duration: 14s; animation-delay: 1.5s; }
        .particle:nth-child(10) { left: 95%; animation-duration: 10s; animation-delay: 3.5s; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background shapes -->
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    
    <!-- Floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Main container with only प्रारंभ in orange -->
    <div class="container">
        <h1>प्रारंभ</h1>
    </div>
</body>
</html>
